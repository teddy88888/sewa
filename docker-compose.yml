# ===== SEWA Platform Docker Compose =====
# Jalankan: docker compose up -d
# Berhenti: docker compose down

services:
  # --- Database ---
  db:
    image: postgres:16-alpine
    container_name: sewa-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sewa
      POSTGRES_PASSWORD: sewa_password
      POSTGRES_DB: sewa_db
    volumes:
      - sewa-pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sewa -d sewa_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- API Server + Frontend ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: sewa-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sewa:sewa_password@db:5432/sewa_db
      PORT: 8080
      NODE_ENV: production
      BASE_PATH: /
    ports:
      - "8080:8080"
    # Untuk development (hot reload dengan volume mount):
    # volumes:
    #   - ./artifacts/api-server/src:/workspace/api-server/src
    #   - ./artifacts/sewa/src:/workspace/sewa/src

# --- Volume untuk persistensi data database ---
volumes:
  sewa-pgdata:
    driver: local
