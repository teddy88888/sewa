kind = "web"
previewPath = "/"
title = "SEWA — Sewa Buku & Mainan Anak"
version = "1.0.0"
id = "artifacts/sewa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20609

[services.development]
run = "pnpm --filter @workspace/sewa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sewa", "run", "build" ]
publicDir = "artifacts/sewa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20609"
BASE_PATH = "/"
