openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SEWA — Sewa Buku & Mainan Anak API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: items
    description: Item listings
  - name: bookings
    description: Booking management
  - name: payments
    description: Payment operations
  - name: users
    description: User management
  - name: stats
    description: Dashboard and aggregates
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  # Items
  /items:
    get:
      operationId: listItems
      tags: [items]
      summary: List all items
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [buku, mainan]
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [available, rented, pending]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemListResponse"

    post:
      operationId: createItem
      tags: [items]
      summary: Create a new item listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"

  /items/featured:
    get:
      operationId: listFeaturedItems
      tags: [items]
      summary: Get featured/recommended items
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"

  /items/recent:
    get:
      operationId: listRecentItems
      tags: [items]
      summary: Get recently viewed or added items
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"

  /items/{id}:
    get:
      operationId: getItem
      tags: [items]
      summary: Get item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: Not found

    patch:
      operationId: updateItem
      tags: [items]
      summary: Update an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"

    delete:
      operationId: deleteItem
      tags: [items]
      summary: Delete an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /items/my:
    get:
      operationId: listMyItems
      tags: [items]
      summary: Get current user's item listings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"

  /items/{id}/favorite:
    post:
      operationId: toggleFavorite
      tags: [items]
      summary: Toggle favorite status on item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteResponse"

  /items/favorites:
    get:
      operationId: listFavorites
      tags: [items]
      summary: Get user's favorite items
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"

  # Bookings
  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List user's bookings
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, paid, active, completed, cancelled]
        - name: role
          in: query
          schema:
            type: string
            enum: [renter, owner]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get booking by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}/confirm:
    post:
      operationId: confirmBooking
      tags: [bookings]
      summary: Owner confirms a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}/cancel:
    post:
      operationId: cancelBooking
      tags: [bookings]
      summary: Cancel a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}/return:
    post:
      operationId: returnBooking
      tags: [bookings]
      summary: Confirm item return
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReturnInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  # Payments
  /payments:
    post:
      operationId: createPayment
      tags: [payments]
      summary: Create a payment for a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}:
    get:
      operationId: getPayment
      tags: [payments]
      summary: Get payment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # Users
  /users/profile:
    get:
      operationId: getProfile
      tags: [users]
      summary: Get user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

    patch:
      operationId: updateProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/wallet:
    get:
      operationId: getWallet
      tags: [users]
      summary: Get user wallet/deposit balance
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  # Stats (wow endpoints)
  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/categories:
    get:
      operationId: getCategoryStats
      tags: [stats]
      summary: Get item count by category
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryStat"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        phone:
          type: ["string", "null"]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [penyewa, pemilik, admin]
        avatarUrl:
          type: ["string", "null"]
        rating:
          type: ["number", "null"]
        totalTransactions:
          type: integer
        depositBalance:
          type: number
        createdAt:
          type: string
          format: date-time

    UserProfile:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
        avatarUrl:
          type: ["string", "null"]
        rating:
          type: ["number", "null"]
        totalTransactions:
          type: integer
        depositBalance:
          type: number
        location:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        location:
          type: string
        avatarUrl:
          type: string

    Item:
      type: object
      required: [id, name, category, pricePerDay, deposit, status, ownerId]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
          enum: [buku, mainan]
        description:
          type: ["string", "null"]
        pricePerDay:
          type: number
        deposit:
          type: number
        location:
          type: ["string", "null"]
        status:
          type: string
          enum: [available, rented, pending]
        imageUrl:
          type: ["string", "null"]
        rating:
          type: ["number", "null"]
        reviewCount:
          type: integer
        ownerId:
          type: integer
        ownerName:
          type: ["string", "null"]
        ownerRating:
          type: ["number", "null"]
        isFavorited:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ItemListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Item"
        total:
          type: integer

    ItemInput:
      type: object
      required: [name, category, pricePerDay, deposit]
      properties:
        name:
          type: string
        category:
          type: string
          enum: [buku, mainan]
        description:
          type: string
        pricePerDay:
          type: number
        deposit:
          type: number
        location:
          type: string
        imageUrl:
          type: string

    ItemUpdate:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
          enum: [buku, mainan]
        description:
          type: string
        pricePerDay:
          type: number
        deposit:
          type: number
        location:
          type: string
        imageUrl:
          type: string
        status:
          type: string
          enum: [available, rented, pending]

    FavoriteResponse:
      type: object
      required: [isFavorited]
      properties:
        isFavorited:
          type: boolean

    Booking:
      type: object
      required: [id, itemId, renterId, startDate, endDate, status, rentalFee, depositAmount, totalAmount]
      properties:
        id:
          type: integer
        itemId:
          type: integer
        itemName:
          type: ["string", "null"]
        itemImageUrl:
          type: ["string", "null"]
        renterId:
          type: integer
        renterName:
          type: ["string", "null"]
        ownerId:
          type: integer
        ownerName:
          type: ["string", "null"]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        durationDays:
          type: integer
        status:
          type: string
          enum: [pending, paid, active, completed, cancelled]
        rentalFee:
          type: number
        depositAmount:
          type: number
        insuranceFee:
          type: number
        serviceFee:
          type: number
        totalAmount:
          type: number
        depositStatus:
          type: string
          enum: [held, refunded, deducted]
        returnCondition:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    BookingInput:
      type: object
      required: [itemId, startDate, endDate]
      properties:
        itemId:
          type: integer
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    ReturnInput:
      type: object
      required: [condition]
      properties:
        condition:
          type: string
          enum: [good, damaged, lost]
        notes:
          type: string

    Payment:
      type: object
      required: [id, bookingId, amount, status, method]
      properties:
        id:
          type: integer
        bookingId:
          type: integer
        amount:
          type: number
        status:
          type: string
          enum: [pending, paid, failed, refunded]
        method:
          type: string
          enum: [bank_transfer, gopay, ovo, dana]
        paidAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    PaymentInput:
      type: object
      required: [bookingId, method]
      properties:
        bookingId:
          type: integer
        method:
          type: string
          enum: [bank_transfer, gopay, ovo, dana]

    Wallet:
      type: object
      required: [balance, heldAmount, availableBalance]
      properties:
        balance:
          type: number
        heldAmount:
          type: number
        availableBalance:
          type: number
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/WalletTransaction"

    WalletTransaction:
      type: object
      required: [id, type, amount, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [deposit, refund, deduction, credit]
        amount:
          type: number
        description:
          type: string
        createdAt:
          type: string
          format: date-time

    DashboardStats:
      type: object
      required: [totalDeposit, activeBookings, totalTransactions, rating]
      properties:
        totalDeposit:
          type: number
        activeBookings:
          type: integer
        totalTransactions:
          type: integer
        rating:
          type: number
        recentBookings:
          type: array
          items:
            $ref: "#/components/schemas/Booking"
        recentlyViewed:
          type: array
          items:
            $ref: "#/components/schemas/Item"

    CategoryStat:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer
        availableCount:
          type: integer
